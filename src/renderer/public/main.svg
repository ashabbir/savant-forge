<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <rect width="512" height="512" rx="112" fill="#0d1117" stroke="#1f242c" stroke-width="4"/>
  <defs>
    <filter id="olympus-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="buffer-alert" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="220" fill="none" stroke="#1f2937" stroke-width="2" stroke-dasharray="10, 15"/>
  
  <path d="M 256,46 A 210,210 0 1,1 66,346" fill="none" stroke="#00f3ff" stroke-width="8" stroke-linecap="round" filter="url(#olympus-glow)"/>
  
  <path d="M 66,346 A 210,210 0 0,1 256,46" fill="none" stroke="#ff3366" stroke-width="8" stroke-dasharray="8, 6" filter="url(#buffer-alert)"/>

  <polygon points="256,90 390,170 390,330 256,410 122,330 122,170" fill="none" stroke="#2a3644" stroke-width="2"/>
  <line x1="256" y1="90" x2="256" y2="410" stroke="#2a3644" stroke-width="1.5"/>
  <line x1="122" y1="170" x2="390" y2="330" stroke="#2a3644" stroke-width="1.5"/>
  <line x1="122" y1="330" x2="390" y2="170" stroke="#2a3644" stroke-width="1.5"/>

  <g transform="translate(0, -10)">
    <path d="M 140,240 L 190,240 L 210,210 L 320,210 L 330,240 L 380,240 C 350,270 330,270 320,280 L 200,280 C 180,270 160,260 140,240 Z" fill="#00f3ff" filter="url(#olympus-glow)" opacity="0.9"/>
    <path d="M 200,280 L 320,280 L 300,340 L 222,340 Z" fill="#0bbdc6"/>
    <path d="M 170,350 L 342,350 L 360,380 L 152,380 Z" fill="#00f3ff" filter="url(#olympus-glow)"/>
  </g>

  <circle cx="256" cy="90" r="6" fill="#00f3ff" filter="url(#olympus-glow)"/>
  <circle cx="390" cy="170" r="6" fill="#00f3ff"/>
  <circle cx="390" cy="330" r="6" fill="#ff3366" filter="url(#buffer-alert)"/>
  <circle cx="256" cy="410" r="6" fill="#00f3ff"/>
  <circle cx="122" cy="330" r="6" fill="#00f3ff"/>
  <circle cx="122" cy="170" r="6" fill="#00f3ff"/>
</svg>
